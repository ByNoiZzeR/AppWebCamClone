name: Build iOS Client (IPA)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile & Pack IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild -project ios-client/ios-client.xcodeproj \
                     -scheme ios-client \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=NO \
                     SYMROOT=../build \
                     clean build > build.log 2>&1

      - name: Strip Code Signature & Package Unsigned IPA
        run: |
          APP_PATH="build/Release-iphoneos/ios-client.app"
          # Remove any code signature directory
          rm -rf "${APP_PATH}/_CodeSignature"
          # Remove any embedded provisioning profile
          rm -f "${APP_PATH}/embedded.mobileprovision"
          # Remove embedded signature from the binary (if any)
          codesign --remove-signature "${APP_PATH}/ios-client" || true
          # Package into IPA
          mkdir -p Payload
          cp -r "${APP_PATH}" Payload/
          zip -r ios-client-unsigned.ipa Payload
          rm -rf Payload

      - name: Commit and Push Build Log on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build.log
          git commit -m "Xcode build log from failed run"
          git push origin HEAD:build-failed-log --force


      - name: Upload Build Log Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build.log
          if-no-files-found: ignore

      - name: Package app into IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/ios-client.app Payload/
          zip -r ios-client.ipa Payload

      - name: Commit and Push IPA to branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cp ios-client-unsigned.ipa ../ios-client-temp.ipa
          git checkout --orphan ipa-build
          git rm -rf .
          mv ../ios-client-temp.ipa ios-client-unsigned.ipa
          git add ios-client-unsigned.ipa
          git commit -m "Automated unsigned IPA build"
          git push origin HEAD:ipa-build --force

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-client-unsigned-ipa
          path: ios-client-unsigned.ipa
          if-no-files-found: error

      - name: Create Release and Upload Unsigned IPA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.0 --title "v1.0.0" --notes "Automated iOS client build (unsigned)" --clobber || true
          gh release upload v1.0.0 ios-client-unsigned.ipa --clobber || true


